services:
  # ==========================================
  # POSTGRES DB
  # ==========================================
  user-db:
    image: postgres:15-alpine
    container_name: user-db
    expose:
      - "5432"
    environment:
      - POSTGRES_DB=${USER_DB_NAME}
      - POSTGRES_USER=${USER_DB_USER}
      - POSTGRES_PASSWORD=${USER_DB_PASSWORD}
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${USER_DB_USER} -d ${USER_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crochet-network

  crochet-db:
    image: postgres:15-alpine
    container_name: crochet-db
    expose:
      - "5432"
    environment:
      - POSTGRES_DB=${CROCHET_DB_NAME}
      - POSTGRES_USER=${CROCHET_DB_USER}
      - POSTGRES_PASSWORD=${CROCHET_DB_PASSWORD}
    volumes:
      - crochet_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${CROCHET_DB_USER} -d ${CROCHET_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crochet-network

  ai-db:
    image: postgres:15-alpine
    container_name: ai-db
    expose:
      - "5432"
    environment:
      - POSTGRES_DB=${AI_DB_NAME}
      - POSTGRES_USER=${AI_DB_USER}
      - POSTGRES_PASSWORD=${AI_DB_PASSWORD}
    volumes:
      - ai_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${AI_DB_USER} -d ${AI_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crochet-network

  # ==========================================
  # THE INGRESS GATEWAY
  # ==========================================
  gateway:
    build:
      context: ./backend/gateway
      dockerfile: Dockerfile
    container_name: crochet_gateway
    ports:
      - "${GATEWAY_PORT}:3000" # Exposes your main API entryway to the frontend
    environment:
      - SPRING_PROFILES_ACTIVE=${APP_PROFILE}
      - USER_SERVICE_URL=http://user-service:8081
      - CROCHET_SERVICE_URL=http://crochet-service:8082
      - AI_SERVICE_URL=http://ai-service:8083
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - INTERNAL_JWT_SECRET=${INTERNAL_JWT_SECRET}
      - OTEL_SERVICE_NAME=gateway
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - OTEL_EXPORTER_OTLP_HEADERS=${OTEL_EXPORTER_OTLP_HEADERS}
      - OTEL_EXPORTER_OTLP_PROTOCOL=${OTEL_EXPORTER_OTLP_PROTOCOL}
    depends_on:
      - user-service
      - crochet-service
      - ai-service
    networks:
      - crochet-network

  # ==========================================
  # JAVA 21 MICROSERVICES
  # ==========================================
  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    container_name: user-service
    expose:
      - "8081"
    environment:
      - SPRING_PROFILES_ACTIVE=${APP_PROFILE}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://user-db:5432/${USER_DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${USER_DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${USER_DB_PASSWORD}
      - INTERNAL_JWT_SECRET=${INTERNAL_JWT_SECRET}
      - OTEL_SERVICE_NAME=user-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - OTEL_EXPORTER_OTLP_HEADERS=${OTEL_EXPORTER_OTLP_HEADERS}
      - OTEL_EXPORTER_OTLP_PROTOCOL=${OTEL_EXPORTER_OTLP_PROTOCOL}
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - crochet-network

  crochet-service:
    build:
      context: ./backend/crochet-service
      dockerfile: Dockerfile
    container_name: crochet-service
    expose:
      - "8082"
    environment:
      - SPRING_PROFILES_ACTIVE=${APP_PROFILE}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://crochet-db:5432/${CROCHET_DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${CROCHET_DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${CROCHET_DB_PASSWORD}
      - INTERNAL_JWT_SECRET=${INTERNAL_JWT_SECRET}
      - OTEL_SERVICE_NAME=crochet-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - OTEL_EXPORTER_OTLP_HEADERS=${OTEL_EXPORTER_OTLP_HEADERS}
      - OTEL_EXPORTER_OTLP_PROTOCOL=${OTEL_EXPORTER_OTLP_PROTOCOL}
    depends_on:
      crochet-db:
        condition: service_healthy
    networks:
      - crochet-network

  ai-service:
    build:
      context: ./backend/ai-service
      dockerfile: Dockerfile
    container_name: ai-service
    expose:
      - "8083"
    environment:
      - SPRING_PROFILES_ACTIVE=${APP_PROFILE}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://ai-db:5432/${AI_DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${AI_DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${AI_DB_PASSWORD}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - INTERNAL_JWT_SECRET=${INTERNAL_JWT_SECRET}
      - OTEL_SERVICE_NAME=ai-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - OTEL_EXPORTER_OTLP_HEADERS=${OTEL_EXPORTER_OTLP_HEADERS}
      - OTEL_EXPORTER_OTLP_PROTOCOL=${OTEL_EXPORTER_OTLP_PROTOCOL}
    depends_on:
      ai-db:
        condition: service_healthy
    networks:
      - crochet-network

# ==========================================
# STORAGE VOLUMES & ISOLATED WIRE NETWORKS
# ==========================================
volumes:
  user_db_data:
  crochet_db_data:
  ai_db_data:

networks:
  crochet-network:
    driver: bridge
