services:
  postgres:
    image: postgres:15-alpine
    container_name: crochet-postgres
    environment:
      CROCHET_DB_NAME: ${CROCHET_DB_NAME}
      CROCHET_DB_USER: ${CROCHET_DB_USER}
      CROCHET_DB_PASSWORD: ${CROCHET_DB_PASSWORD}
      POSTGRES_DB: ${CROCHET_DB_NAME}
      POSTGRES_USER: ${CROCHET_DB_USER}
      POSTGRES_PASSWORD: ${CROCHET_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${CROCHET_DB_USER} -d ${CROCHET_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - crochet-network

  gateway:
    build:
      context: ./backend/gateway
      dockerfile: Dockerfile
    container_name: crochet_gateway
    ports:
      - "${GATEWAY_PORT}:3000"
    environment:
      - SPRING_PROFILES_ACTIVE=${APP_PROFILE}
      - USER_SERVICE_URL=http://user-service:8081
      - CROCHET_SERVICE_URL=http://crochet-service:8082
      - AI_SERVICE_URL=http://ai-service:8083
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - INTERNAL_JWT_SECRET=${INTERNAL_JWT_SECRET}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/firebase-credentials.json
      - OTEL_SERVICE_NAME=gateway
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - OTEL_EXPORTER_OTLP_PROTOCOL=${OTEL_EXPORTER_OTLP_PROTOCOL}
    volumes:
      - ${FIREBASE_CREDENTIALS_PATH:-./secrets/firebase-credentials-dev.json}:/app/firebase-credentials.json:ro
    depends_on:
      - user-service
      - crochet-service
      - ai-service
    networks:
      - crochet-network

  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    container_name: user-service
    restart: unless-stopped
    expose:
      - "8081"
    volumes:
      - ${FIREBASE_CREDENTIALS_PATH:-./secrets/firebase-credentials-dev.json}:/app/firebase-credentials.json:ro
    environment:
      - SPRING_PROFILES_ACTIVE=${APP_PROFILE}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${CROCHET_DB_NAME}?currentSchema=user_service
      - SPRING_DATASOURCE_USERNAME=${CROCHET_DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${CROCHET_DB_PASSWORD}
      - INTERNAL_JWT_SECRET=${INTERNAL_JWT_SECRET}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/firebase-credentials.json
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - OTEL_SERVICE_NAME=user-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - OTEL_EXPORTER_OTLP_PROTOCOL=${OTEL_EXPORTER_OTLP_PROTOCOL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - crochet-network

  crochet-service:
    build:
      context: ./backend/crochet-service
      dockerfile: Dockerfile
    container_name: crochet-service
    restart: unless-stopped
    expose:
      - "8082"
    environment:
      - SPRING_PROFILES_ACTIVE=${APP_PROFILE}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${CROCHET_DB_NAME}?currentSchema=crochet_service
      - SPRING_DATASOURCE_USERNAME=${CROCHET_DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${CROCHET_DB_PASSWORD}
      - INTERNAL_JWT_SECRET=${INTERNAL_JWT_SECRET}
      - DB_ENCRYPTION_SECRET=${DB_ENCRYPTION_SECRET}
      - OTEL_SERVICE_NAME=crochet-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - OTEL_EXPORTER_OTLP_PROTOCOL=${OTEL_EXPORTER_OTLP_PROTOCOL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - crochet-network

  ai-service:
    build:
      context: ./backend/ai-service
      dockerfile: Dockerfile
    container_name: ai-service
    restart: unless-stopped
    expose:
      - "8083"
    environment:
      - SPRING_PROFILES_ACTIVE=${APP_PROFILE}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${CROCHET_DB_NAME}?currentSchema=ai_service
      - SPRING_DATASOURCE_USERNAME=${CROCHET_DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${CROCHET_DB_PASSWORD}
      - LLM_TEXT_GENERATION_PROVIDER=${LLM_TEXT_GENERATION_PROVIDER}
      - LLM_IMAGE_GENERATION_PROVIDER=${LLM_IMAGE_GENERATION_PROVIDER}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_TEXT_MODEL=${GEMINI_TEXT_MODEL}
      - GEMINI_IMAGE_MODEL=${GEMINI_IMAGE_MODEL}
      - IMAGE_GENERATION_TOKEN_COST=${IMAGE_GENERATION_TOKEN_COST}
      - IMAGE_GENERATION_DEFAULT_WIDTH=${IMAGE_GENERATION_DEFAULT_WIDTH}
      - IMAGE_GENERATION_DEFAULT_HEIGHT=${IMAGE_GENERATION_DEFAULT_HEIGHT}
      - IMAGE_GENERATION_DEFAULT_MODEL=${IMAGE_GENERATION_DEFAULT_MODEL}
      - INTERNAL_JWT_SECRET=${INTERNAL_JWT_SECRET}
      - DB_ENCRYPTION_SECRET=${DB_ENCRYPTION_SECRET}
      - OTEL_SERVICE_NAME=ai-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - OTEL_EXPORTER_OTLP_PROTOCOL=${OTEL_EXPORTER_OTLP_PROTOCOL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - crochet-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.95.0
    container_name: otel-collector
    restart: unless-stopped
    command: [ "--config=/etc/otelcol/config.yaml" ]
    volumes:
      - ./docker/otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
      - /proc:/hostfs/proc:ro
      - /sys:/hostfs/sys:ro
      - /:/hostfs:ro
    environment:
      - GRAFANA_USER_ID=${GRAFANA_USER_ID}
      - GRAFANA_API_TOKEN=${GRAFANA_API_TOKEN}
      - GRAFANA_OTLP_ENDPOINT=${GRAFANA_OTLP_ENDPOINT}
      - GRAFANA_HOST_NAME=${GRAFANA_HOST_NAME}
    networks:
      - crochet-network

volumes:
  postgres_data:

networks:
  crochet-network:
    driver: bridge
