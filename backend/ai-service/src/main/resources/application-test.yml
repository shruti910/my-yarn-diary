server:
  port: 8083

spring:
  datasource:
    url: jdbc:h2:mem:ai_test_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: password
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

gemini:
  api:
    key: mock-test-key
    url: http://localhost:8083/mock-gemini
