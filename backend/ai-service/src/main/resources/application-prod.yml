server:
  port: ${PORT:8083}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://ai-db:5432/ai_db}
    username: ${SPRING_DATASOURCE_USERNAME:ai_admin}
    password: ${SPRING_DATASOURCE_PASSWORD:AiPassword123}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
      
  flyway:
    enabled: true
    baseline-on-migrate: true

logging:
  include-application-name: true
  structured:
    format:
      console: logstash 

management:
  tracing:
    sampling:
      probability: 1.0 
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"
  endpoint:
    health:
      show-details: always

gemini:
  api:
    key: ${GEMINI_API_KEY}
    url: ${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent}



