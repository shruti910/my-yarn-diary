server:
  port: ${PORT:8083}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://ai-db:5432/ai_db}
    username: ${SPRING_DATASOURCE_USERNAME:ai_admin}
    password: ${SPRING_DATASOURCE_PASSWORD:AiPassword123}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
      
  flyway:
    enabled: true
    baseline-on-migrate: true

internal:
  jwt:
    secret: ${INTERNAL_JWT_SECRET}

logging:
  include-application-name: true
  structured:
    format:
      console: logstash 

management:
  tracing:
    sampling:
      probability: 1.0 
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"
  endpoint:
    health:
      show-details: always

llm:
  active-provider: ${LLM_PROVIDER:gemini}

gemini:
  api:
    key: ${GEMINI_API_KEY}
    base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
    text-model: ${GEMINI_TEXT_MODEL:gemini-3.5-flash}
    image-model: ${GEMINI_IMAGE_MODEL:gemini-3.1-flash-image}

