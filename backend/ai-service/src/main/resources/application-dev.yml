server:
  port: 8083

spring:
  datasource:
    url: jdbc:postgresql://postgres-db:5432/crochet_db
    username: crochet_admin
    password: SecretPassword123
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

llm:
  active-provider: ${LLM_PROVIDER:gemini}

gemini:
  api:
    key: ${GEMINI_API_KEY}
    base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
    text-model: ${GEMINI_TEXT_MODEL:gemini-3.5-flash}
    image-model: ${GEMINI_IMAGE_MODEL:gemini-3.1-flash-image}


