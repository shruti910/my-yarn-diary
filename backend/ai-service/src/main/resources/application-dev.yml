server:
  port: 8083

spring:
  datasource:
    url: jdbc:postgresql://postgres-db:5432/crochet_db
    username: crochet_admin
    password: SecretPassword123
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

gemini:
  api:
    key: ${GEMINI_API_KEY}
    url: ${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent}
