server:
  port: ${PORT:8081}

spring:

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://user-db:5432/user_db}
    username: ${SPRING_DATASOURCE_USERNAME:user_admin}
    password: ${SPRING_DATASOURCE_PASSWORD:UserPassword123}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
      
  flyway:
    enabled: true
    baseline-on-migrate: true

logging:
  include-application-name: true
  structured:
    format:
      console: logstash 

management:
  tracing:
    sampling:
      probability: 1.0 
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"
  endpoint:
    health:
      show-details: always