server:
  port: ${PORT:8082}

spring:
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/crochet_db?currentSchema=crochet_service}
    username: ${SPRING_DATASOURCE_USERNAME:crochet_admin}
    password: ${SPRING_DATASOURCE_PASSWORD:CrochetPassword123}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
      
  flyway:
    enabled: true
    baseline-on-migrate: true
    create-schemas: true
    default-schema: crochet_service
    schemas: crochet_service

internal:
  jwt:
    secret: ${INTERNAL_JWT_SECRET}

logging:
  include-application-name: true
  structured:
    format:
      console: logstash 

management:
  tracing:
    sampling:
      probability: 1.0 
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"
  endpoint:
    health:
      show-details: always
